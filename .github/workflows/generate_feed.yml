name: Generate CIAN Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Legenda feeds
        env:
          CIAN_ID_MARUSINO: ${{ secrets.CIAN_ID_MARUSINO }}
          CIAN_ID_KORENEVO: ${{ secrets.CIAN_ID_KORENEVO }}
          CIAN_ID_SVET: ${{ secrets.CIAN_ID_SVET }}
        run: python legenda/fetch_feed.py

      - name: Generate Aeon feed
        run: python aeon/fetch_aeon.py

      - name: Commit and push feeds
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add legenda/marusino_feed.xml legenda/korenevo_feed.xml legenda/svet_feed.xml legenda/nekrasovka_feed.xml legenda/dominanta_feed.xml aeon/aeon_riverpark_feed.xml
          git diff --staged --quiet || git commit -m "chore: update feeds [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
