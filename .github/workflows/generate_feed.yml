name: Generate CIAN Feed

on:
  schedule:
    # Каждый час в 00 минут
    - cron: '0 * * * *'
  workflow_dispatch:  # Ручной запуск из интерфейса GitHub

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate feed
        env:
          CIAN_ID_MARUSINO: ${{ secrets.CIAN_ID_MARUSINO }}
          CIAN_ID_KORENEVO: ${{ secrets.CIAN_ID_KORENEVO }}
        run: python fetch_feed.py

      - name: Commit and push feed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cian_feed.xml
          git diff --staged --quiet || git commit -m "chore: update cian_feed.xml [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
